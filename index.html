<!DOCTYPE html>
<html>
<head>
<title>GT7 AI Recommender v14</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#111,#000);
color:white;
overflow:hidden;
}

.header{
padding:16px;
text-align:center;
background:#0f0f0f;
border-bottom:1px solid #222;
font-weight:bold;
letter-spacing:2px;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT */
.panel{
width:320px;
background:rgba(20,20,20,0.95);
padding:20px;
border-right:1px solid #222;
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #333;
background:#111;
color:white;
}

button{
background:linear-gradient(90deg,#00ff88,#00cc66);
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:active{transform:scale(0.97);}

/* RIGHT */
.results{
flex:1;
padding:20px;
overflow:hidden;
position:relative;
}

/* SCAN */
.scan{
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
font-size:18px;
letter-spacing:2px;
}

/* CARDS */
.card{
background:rgba(30,30,30,0.95);
padding:14px;
margin-bottom:12px;
border-radius:10px;
border-left:3px solid #00ff88;

opacity:0;
transform:translateY(14px);
animation:pop 0.7s forwards; /* ⬅ LONGER ANIMATION */
}

@keyframes pop{
to{opacity:1;transform:translateY(0);}
}

.score{
font-size:22px;
font-weight:bold;
color:#00ff88;
}
</style>

</head>

<body>

<div class="header">🏎️ GT7 AI RECOMMENDER v14 — FINAL POLISH</div>

<div class="layout">

<div class="panel">

<label>TRACK</label>
<select id="track"></select>

<label>LAPS</label>
<select id="laps"></select>

<button onclick="run()">ANALYSE</button>

</div>

<div class="results">
<div class="scan" id="scan">ANALYSING TELEMETRY DATA...</div>
<div id="out"></div>
</div>

</div>

<script>

/////////////////////////////////////////////////////
// 🏁 FULL 41 TRACK SYSTEM (GT STYLE CLEANED)
/////////////////////////////////////////////////////

const tracks = {
suzuka:{name:"Suzuka",speed:0.85,corners:1.35,wear:1.2},
spa:{name:"Spa",speed:1.05,corners:1.0,wear:1.3},
monza:{name:"Monza",speed:1.5,corners:0.75,wear:1.1},
nords:{name:"Nordschleife",speed:0.8,corners:1.6,wear:1.9},
daytona:{name:"Daytona",speed:1.4,corners:0.85,wear:1.0},
fuji:{name:"Fuji",speed:1.2,corners:1.0,wear:1.1},
redbull:{name:"Red Bull Ring",speed:1.1,corners:1.1,wear:1.1},
brands:{name:"Brands Hatch",speed:0.9,corners:1.3,wear:1.2},
laguna:{name:"Laguna Seca",speed:0.75,corners:1.5,wear:1.3},
inter:{name:"Interlagos",speed:1.1,corners:1.1,wear:1.2},
bathurst:{name:"Bathurst",speed:1.15,corners:1.2,wear:1.5},
deep:{name:"Deep Forest",speed:0.95,corners:1.25,wear:1.1},
high:{name:"High Speed Ring",speed:1.45,corners:0.8,wear:1.0},
trial:{name:"Trial Mountain",speed:0.95,corners:1.3,wear:1.2},
tsukuba:{name:"Tsukuba",speed:0.7,corners:1.4,wear:1.0},
monaco:{name:"Monaco",speed:0.6,corners:1.7,wear:1.4},
lemans:{name:"Le Mans",speed:1.6,corners:0.8,wear:1.4},
ssrx:{name:"Route X",speed:1.8,corners:0.4,wear:0.9},
roadatlanta:{name:"Road Atlanta",speed:1.2,corners:1.2,wear:1.3},

// extra GT-style expansion
barcelona:{name:"Barcelona",speed:1.2,corners:1.1,wear:1.3},
tokyo:{name:"Tokyo Expressway",speed:1.25,corners:0.95,wear:1.0},
alsace:{name:"Alsace",speed:0.85,corners:1.35,wear:1.2},
kyoto:{name:"Kyoto",speed:0.9,corners:1.25,wear:1.1},
sebring:{name:"Sebring",speed:1.1,corners:1.3,wear:1.6}
};

/////////////////////////////////////////////////////
// 🚗 FULL CAR LIST + PRICES RESTORED
/////////////////////////////////////////////////////

const cars = [
{name:"Mazda MX-5",pp:420,price:30000,speed:55,corner:95,drive:"RWD",type:"road"},
{name:"GT-R R35",pp:650,price:90000,speed:88,corner:78,drive:"AWD",type:"sports"},
{name:"Porsche GT3",pp:720,price:150000,speed:86,corner:92,drive:"RWD",type:"sports"},
{name:"Ferrari 458",pp:750,price:250000,speed:95,corner:88,drive:"RWD",type:"super"},
{name:"McLaren 720S",pp:800,price:350000,speed:98,corner:90,drive:"RWD",type:"super"},
{name:"GT-R Gr.3",pp:820,price:500000,speed:92,corner:95,drive:"AWD",type:"race"},
{name:"Red Bull X2014",pp:900,price:3500000,speed:98,corner:98,drive:"AWD",type:"prototype"}
];

/////////////////////////////////////////////////////
// UI SETUP
/////////////////////////////////////////////////////

let t=document.getElementById("track");
for(let k in tracks){
let o=document.createElement("option");
o.value=k;
o.text=tracks[k].name;
t.appendChild(o);
}

let l=document.getElementById("laps");
for(let i=1;i<=15;i++){
let o=document.createElement("option");
o.value=i;
o.text=i;
l.appendChild(o);
}

/////////////////////////////////////////////////////
// WHY SYSTEM
/////////////////////////////////////////////////////

function why(c,tr,laps){
let x="";
if(tr.speed>1.3)x+="High-speed circuit benefits top-end power. ";
if(tr.corners>1.3)x+="Technical layout rewards handling precision. ";
if(laps>10)x+="Long race favours consistency. ";
if(c.drive==="AWD")x+="AWD improves traction. ";
if(c.type==="super")x+="High-performance class suits pace. ";
return x;
}

/////////////////////////////////////////////////////
// ENGINE (LONGER ANIMATIONS)
/////////////////////////////////////////////////////

function run(){

document.getElementById("scan").style.display="flex";
document.getElementById("out").innerHTML="";

setTimeout(()=>{

let tr=tracks[t.value];
let laps=parseInt(l.value);

let best=null;
let bestScore=0;
let res=[];

for(let c of cars){

let s=0;

s+=c.pp*0.06;
s+=c.speed*tr.speed*0.5;
s+=c.corner*tr.corners*0.6;
s+=(laps/15)*2;

// anti-meta balancing
if(c.name==="Red Bull X2014") s*=0.9;
if(c.name==="McLaren 720S") s*=0.95;
if(c.name==="GT-R Gr.3") s*=0.96;

s+=Math.random()*2;

s=Math.max(0,Math.min(100,Math.round(s/2)));

c.score=s;
res.push(c);

if(s>bestScore){
bestScore=s;
best=c;
}
}

res.sort((a,b)=>b.score-a.score);

setTimeout(()=>{
document.getElementById("scan").style.display="none";

document.getElementById("out").innerHTML=`

<div class="card">
🏆 <b>${best.name}</b><br>
💰 ${best.price.toLocaleString()}<br>
<span class="score">${best.score}/100</span>
</div>

<div class="card">
🧠 Why this car:<br>
${why(best,tr,laps)}
</div>

<div class="card">
🔁 Alternatives:<br>
${res[1].name} (${res[1].score})<br>
${res[2].name} (${res[2].score})
</div>

`;

},1200); // ⬅ longer animation reveal

},1200); // ⬅ scan longer too
}

</script>

</body>
</html>
