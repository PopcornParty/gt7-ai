<!DOCTYPE html>
<html>
<head>
<title>GT7 AI Recommender v7</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
}

/* HEADER (GT7 STYLE) */
.header {
    background: linear-gradient(90deg, #0f0f0f, #1c1c1c);
    padding: 18px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 2px;
    border-bottom: 1px solid #333;
}

/* LAYOUT */
.layout {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 30px;
    flex-wrap: wrap;
}

/* LEFT PANEL */
.panel {
    width: 320px;
    background: rgba(20,20,20,0.95);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 20px rgba(0,255,136,0.08);
}

/* RIGHT PANEL */
.results {
    width: 420px;
}

/* INPUTS */
select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #111;
    color: white;
    border: 1px solid #333;
    border-radius: 6px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    color: black;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
}

/* RESULT CARDS */
.card {
    background: rgba(25,25,25,0.95);
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border-left: 3px solid #00ff88;
    text-align: left;
    box-shadow: 0 0 10px rgba(0,255,136,0.05);
}

.score {
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
}
</style>

</head>

<body>

<div class="header">🏎️ GT7 AI RECOMMENDER</div>

<div class="layout">

<div class="panel">

<label>TRACK</label>
<select id="track"></select>

<label>WEATHER</label>
<select id="weather">
<option value="dry">Dry</option>
<option value="wet">Wet</option>
</select>

<button onclick="run()">ANALYSE</button>

</div>

<div class="results" id="out"></div>

</div>

<script>

/////////////////////////////////////////////////////
// 🏁 TRACK SYSTEM (real GT-style behaviour model)
/////////////////////////////////////////////////////

const tracks = {
suzuka:{name:"Suzuka", speed:0.85, corners:1.35, wear:1.2},
spa:{name:"Spa-Francorchamps", speed:1.05, corners:1.0, wear:1.3},
monza:{name:"Monza", speed:1.5, corners:0.75, wear:1.1},
nur:{name:"Nürburgring GP", speed:1.0, corners:1.25, wear:1.4},
nords:{name:"Nordschleife", speed:0.8, corners:1.6, wear:1.8},
daytona:{name:"Daytona", speed:1.4, corners:0.8, wear:1.0},
fuji:{name:"Fuji Speedway", speed:1.2, corners:1.0, wear:1.1},
redbull:{name:"Red Bull Ring", speed:1.1, corners:1.1, wear:1.1},
brands:{name:"Brands Hatch", speed:0.9, corners:1.3, wear:1.2},
tokyo:{name:"Tokyo Expressway", speed:1.25, corners:0.95, wear:1.0},
laguna:{name:"Laguna Seca", speed:0.75, corners:1.5, wear:1.3},
inter:{name:"Interlagos", speed:1.1, corners:1.1, wear:1.2},
bathurst:{name:"Mount Panorama", speed:1.15, corners:1.2, wear:1.4},
deep:{name:"Deep Forest", speed:0.95, corners:1.25, wear:1.1},
high:{name:"High Speed Ring", speed:1.45, corners:0.8, wear:1.0}
};

/////////////////////////////////////////////////////
// 🚗 CAR SYSTEM (GT-style balanced classes)
/////////////////////////////////////////////////////

const cars = [
{name:"Mazda MX-5", pp:420, speed:55, corner:95, wet:95, drive:"RWD", type:"road"},
{name:"Toyota GR Supra", pp:580, speed:75, corner:80, wet:75, drive:"RWD", type:"sports"},
{name:"Nissan GT-R R35", pp:650, speed:88, corner:78, wet:92, drive:"AWD", type:"sports"},
{name:"Porsche 911 GT3", pp:720, speed:86, corner:92, wet:88, drive:"RWD", type:"sports"},
{name:"Ferrari 458 Italia", pp:750, speed:95, corner:88, wet:70, drive:"RWD", type:"super"},
{name:"Lamborghini Huracan", pp:780, speed:97, corner:84, wet:68, drive:"AWD", type:"super"},
{name:"McLaren 720S", pp:800, speed:98, corner:90, wet:78, drive:"RWD", type:"super"},
{name:"GT-R Gr.3", pp:820, speed:92, corner:95, wet:95, drive:"AWD", type:"race"},
{name:"Red Bull X2014", pp:980, speed:99, corner:99, wet:80, drive:"AWD", type:"prototype"}
];

/////////////////////////////////////////////////////
// LOAD TRACKS INTO UI
/////////////////////////////////////////////////////

let sel = document.getElementById("track");

for(let k in tracks){
let o = document.createElement("option");
o.value = k;
o.text = tracks[k].name;
sel.appendChild(o);
}

/////////////////////////////////////////////////////
// 🧠 CORE AI ENGINE
/////////////////////////////////////////////////////

function run(){

let t = tracks[document.getElementById("track").value];
let w = document.getElementById("weather").value;

let best = null;
let bestScore = 0;
let results = [];

for(let c of cars){

let score = 0;

// PP influence (GT balancing core)
score += c.pp * 0.07;

// performance vs track demand
score += c.speed * t.speed * 0.6;
score += c.corner * t.corners * 0.6;

// endurance factor (long tracks matter more)
score -= t.wear * (100 - c.pp) * 0.01;

// wet physics
if(w === "wet"){
    score += c.wet * 0.9;
    if(c.drive === "AWD") score += 6;
    if(c.drive === "RWD") score -= 2;
}

// class identity (GT logic feel)
if(c.type === "road") score += 2;
if(c.type === "sports") score += 4;
if(c.type === "race") score += 6;
if(c.type === "prototype") score += 3;

// normalize
score = Math.max(0, Math.min(100, Math.round(score / 2)));

c.score = score;
results.push(c);

if(score > bestScore){
bestScore = score;
best = c;
}
}

results.sort((a,b)=>b.score-a.score);

document.getElementById("out").innerHTML = `
<div class="card"><b>🏆 Best Car:</b><br>${best.name}</div>
<div class="card"><span class="score">Match: ${best.score}/100</span></div>
<div class="card"><b>🧠 Why this works:</b><br>
PP balance + track physics + drivetrain + wet grip simulation</div>
<div class="card"><b>🔁 Alternatives:</b><br>
${results[1].name} (${results[1].score})<br>
${results[2].name} (${results[2].score})<br>
${results[3].name} (${results[3].score})</div>
`;

}

</script>

</body>
</html>
